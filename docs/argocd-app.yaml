apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: astra-monorepo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/astra.git'
    path: k8s
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: astra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
